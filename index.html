<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshootiq - Interactive Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: #334155; min-height: 100vh; }
        .container { max-width: 650px; margin: 0 auto; padding: 30px 20px; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 1.6rem; color: #1e293b; margin-bottom: 6px; }
        header p { color: #64748b; font-size: 13px; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .card h2 { font-size: 0.95rem; margin-bottom: 14px; color: #475569; font-weight: 600; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 5px; font-size: 13px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; }
        .form-group textarea { min-height: 70px; }
        .btn { background: #6366f1; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { background: #4f46e5; }
        .btn:disabled { background: #94a3b8; }
        .output { background: #f8fafc; border-radius: 6px; padding: 16px; margin-top: 14px; display: none; }
        .output.visible { display: block; }
        .output-item { padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        .output-item:last-child { border: none; }
        .output-item::before { content: '→ '; color: #6366f1; }
        .history { margin-top: 20px; }
        .history h3 { font-size: 13px; margin-bottom: 10px; color: #475569; }
        .history-item { background: #f8fafc; padding: 10px; border-radius: 6px; margin-bottom: 6px; font-size: 12px; color: #64748b; }
        .clear-btn { background: #ef4444; margin-top: 8px; }
        .clear-btn:hover { background: #dc2626; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Troubleshootiq</h1>
            <p>Tool for users</p>
        </header>
        
        <div class="card">
            <h2>Enter Details</h2>
            <div class="form-group"><label>Input 1</label><input type="text" id="input1" placeholder="Enter value..."></div>
<div class="form-group"><label>Input 2</label><input type="text" id="input2" placeholder="Enter value..."></div>
            <button class="btn" id="actionBtn" onclick="runAction()">Generate Result</button>
            
            <div class="output" id="output">
                <div id="results"></div>
            </div>
        </div>
        
        <div class="history">
            <h3>📜 Previous Results</h3>
            <div id="historyList"></div>
            <button class="btn clear-btn" onclick="clearHistory()">Clear History</button>
        </div>
    </div>
    
    <script>
        const STORAGE_KEY = 'ai_factory_troubleshootiq_history';
        const WORKFLOW = 'general';
        
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        
        function renderHistory() {
            const container = document.getElementById('historyList');
            if (!history.length) {
                container.innerHTML = '<p style="color:#94a3b8;font-size:12px;">No history yet.</p>';
                return;
            }
            container.innerHTML = history.slice(0, 5).map(h => 
                '<div class="history-item">' + new Date(h.time).toLocaleString() + ' - ' + (h.result || 'Generated').substring(0, 40) + '</div>'
            ).join('');
        }
        
        function saveHistory(result) {
            history.unshift({ result, time: Date.now() });
            history = history.slice(0, 20);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            renderHistory();
        }
        
        function clearHistory() {
            history = [];
            localStorage.setItem(STORAGE_KEY, '[]');
            renderHistory();
        }
        
        const outputs = {
            business: ['✓ Set up Google Business Profile', '✓ Add business photos', '✓ Complete business description', '✓ Verify location', '✓ Enable messaging'],
            content: ['Write about your latest product', 'Share customer success story', 'Create how-to guide', 'Post team spotlight', 'Announce special offer'],
            reviews: ['Thank you sincerely for your feedback!', 'We apologize for falling short', 'We value your honest opinion', 'Would love to serve you better'],
            booking: ['Appointment scheduled for ' + new Date().toLocaleDateString(), 'Reminder sent to customer', 'Calendar updated', 'Confirmation email sent'],
            finance: ['Invoice #INV-001 created', 'Payment link generated', 'Receipt saved to records', 'Report updated'],
            leads: ['Lead captured: ' + new Date().toISOString(), 'Auto-followup scheduled', 'CRM record created', 'Notification sent'],
            general: ['Result generated based on input', 'Processing complete', 'Output ready for use', 'Action completed']
        };
        
        function runAction() {
            const btn = document.getElementById('actionBtn');
            const output = document.getElementById('output');
            const results = document.getElementById('results');
            
            const inputs = document.querySelectorAll('input, select, textarea');
            let hasValue = false;
            inputs.forEach(i => { if (i.value) hasValue = true; });
            
            if (!hasValue) { alert('Please fill in at least one field'); return; }
            
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            setTimeout(() => {
                const items = outputs[WORKFLOW] || outputs.general;
                results.innerHTML = items.map(i => '<div class="output-item">' + i + '</div>').join('');
                output.classList.add('visible');
                saveHistory('Generated ' + items.length + ' items');
                btn.disabled = false;
                btn.textContent = 'Generate Result';
            }, 600);
        }
        
        renderHistory();
    </script>
</body>
</html>
