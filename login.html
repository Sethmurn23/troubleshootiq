<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #1a1a2e; text-align: center; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
        }
        input:focus { border-color: #667eea; outline: none; }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .switch { text-align: center; margin-top: 20px; color: #666; }
        .switch a { color: #667eea; text-decoration: none; }
        .error { color: #ef4444; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome Back</h1>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="switch">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
    
    <script>
        const isDryRun = false;
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (isDryRun) {
                // Simulate login
                await new Promise(r => setTimeout(r, 1000));
                
                const user = {
                    id: 'user_' + Date.now(),
                    email: email,
                    subscription: 'free',
                    created: new Date().toISOString()
                };
                
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = '/';
            } else {
                // Real Supabase auth
                // Implementation here
            }
        });
    </script>
</body>
</html>
